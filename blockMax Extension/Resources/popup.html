<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <div class="brand">
            <img src="images/toolbar-icon-active.svg" class="logo" alt="">
            <span>blockMax</span>
        </div>
        <div class="status-pill" id="statusPill">Loading…</div>
    </header>

    <section>
        <h2>Blocked Sites</h2>
        <ul id="siteList" class="site-list"></ul>
        <div class="add-row">
            <input type="text" id="siteInput" placeholder="twitter.com" autocomplete="off" spellcheck="false">
            <button id="addBtn">Add</button>
        </div>
    </section>

    <section>
        <h2>Schedule</h2>
        <label class="toggle-row">
            <span>Enable schedule</span>
            <span class="toggle-wrap">
                <input type="checkbox" id="scheduleEnabled">
                <span class="toggle"></span>
            </span>
        </label>
        <div id="scheduleDetails">
            <div class="days-row">
                <label class="day-label"><input type="checkbox" value="1"><span>M</span></label>
                <label class="day-label"><input type="checkbox" value="2"><span>T</span></label>
                <label class="day-label"><input type="checkbox" value="3"><span>W</span></label>
                <label class="day-label"><input type="checkbox" value="4"><span>T</span></label>
                <label class="day-label"><input type="checkbox" value="5"><span>F</span></label>
                <label class="day-label"><input type="checkbox" value="6"><span>S</span></label>
                <label class="day-label"><input type="checkbox" value="0"><span>S</span></label>
            </div>
            <div class="time-row">
                <input type="time" id="startTime">
                <span>to</span>
                <input type="time" id="endTime">
            </div>
        </div>
    </section>

    <section>
        <h2>Block Messages</h2>
        <p class="section-hint">Shown randomly on the block page — leave any blank to skip</p>
        <div class="message-list">
            <input type="text" class="message-input" id="msg0" placeholder="Message 1" spellcheck="false">
            <input type="text" class="message-input" id="msg1" placeholder="Message 2" spellcheck="false">
            <input type="text" class="message-input" id="msg2" placeholder="Message 3" spellcheck="false">
        </div>
        <div class="msg-save-row">
            <button id="saveMsgsBtn">Save</button>
            <span id="msgConfirm" class="msg-confirm"></span>
        </div>
    </section>

    <script src="popup.js" defer></script>
</body>
</html>
