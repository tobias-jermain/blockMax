<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked — blockMax</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root { color-scheme: light dark; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #1c1c1e; color: #f5f5f7; }
        }

        .card {
            text-align: center;
            max-width: 380px;
            padding: 56px 40px;
        }

        .shield {
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            display: block;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
        }

        p {
            font-size: 16px;
            color: #6e6e73;
            line-height: 1.55;
        }

        @media (prefers-color-scheme: dark) {
            p { color: #98989d; }
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #e5e5e7;
            border-radius: 2px;
            margin: 24px auto;
        }

        @media (prefers-color-scheme: dark) {
            .divider { background: #3a3a3c; }
        }

        .hint {
            font-size: 14px;
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="images/toolbar-icon-active.svg" class="shield" alt="blockMax">
        <h1>Stay focused.</h1>
        <p>This site is blocked during your focus session.</p>
        <div class="divider"></div>
        <p class="hint">You've got this. Come back later.</p>
    </div>
</body>
</html>
